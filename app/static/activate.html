<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>激活 — 不挂科神器</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .activate-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--paper);
      padding: 2rem;
    }
    .activate-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .activate-card h1 {
      font-size: 1.5rem;
      color: var(--brand);
      margin-bottom: 0.5rem;
    }
    .activate-card .subtitle {
      color: var(--ink-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .trial-banner {
      background: var(--brand-soft);
      border: 1px solid var(--brand);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .trial-banner .days {
      font-size: 2rem;
      font-weight: bold;
      color: var(--brand);
    }
    .trial-banner .label {
      color: var(--ink-muted);
      font-size: 0.85rem;
    }
    .machine-id-box {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      word-break: break-all;
      text-align: left;
      color: var(--ink-muted);
    }
    .machine-id-box .label {
      font-family: var(--font);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-faint);
      margin-bottom: 0.25rem;
    }
    .code-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: var(--font-mono);
      text-align: center;
      letter-spacing: 0.05em;
      transition: border-color var(--duration-fast);
      margin-bottom: 1rem;
    }
    .code-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-ring);
    }
    .btn-activate {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--duration-fast);
      background: var(--brand);
      color: white;
    }
    .btn-activate:hover { background: var(--brand-hover); }
    .btn-activate:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 1rem;
      font-size: 0.9rem;
      min-height: 1.5rem;
    }
    .msg.ok { color: var(--ok); }
    .msg.bad { color: var(--bad); }
    .btn-enter {
      margin-top: 1.5rem;
      background: none;
      border: none;
      color: var(--brand);
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="activate-page">
    <div class="activate-card">
      <h1>不挂科神器</h1>
      <p class="subtitle" id="statusText">正在检查授权状态…</p>

      <div id="trialSection" style="display:none">
        <div class="trial-banner">
          <div class="days" id="trialDays">7</div>
          <div class="label">天试用剩余</div>
        </div>
      </div>

      <div id="licensedSection" style="display:none">
        <div class="trial-banner" style="border-color: var(--ok); background: var(--ok-soft);">
          <div style="font-size:1.2rem;font-weight:bold;color:var(--ok);">已激活 ✅</div>
          <div class="label" id="licensedInfo"></div>
        </div>
      </div>

      <div class="machine-id-box">
        <div class="label">本机识别码（发给客服获取激活码）</div>
        <div id="machineId">加载中…</div>
        <div style="margin-top:0.5rem">
          <button onclick="copyMachineId()" style="font-size:0.75rem;background:var(--surface-3);border:1px solid var(--line);border-radius:4px;padding:3px 8px;cursor:pointer;color:var(--ink-muted);">复制识别码</button>
        </div>
      </div>

      <div id="activateSection">
        <input
          type="text"
          id="codeInput"
          class="code-input"
          placeholder="输入激活码（XXXXX-XXXXX-XXXXX-...）"
          autocomplete="off"
        />
        <button id="btnActivate" class="btn-activate" onclick="doActivate()">激活</button>
        <div class="msg" id="msg"></div>
      </div>

      <button class="btn-enter" id="btnEnter" onclick="enterApp()" style="display:none">
        进入应用 →
      </button>
    </div>
  </div>

<script>
const API = "/api";

function $(id) { return document.getElementById(id); }

function setMsg(text, ok) {
  const el = $("msg");
  el.textContent = text;
  el.className = "msg " + (ok ? "ok" : "bad");
}

async function copyMachineId() {
  const mid = $("machineId").textContent;
  try {
    await navigator.clipboard.writeText(mid);
    setMsg("已复制识别码", true);
  } catch {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = mid;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    setMsg("已复制识别码", true);
  }
}

async function checkStatus() {
  try {
    const r = await fetch(API + "/license/status");
    const s = await r.json();
    $("machineId").textContent = s.machine_id || "未知";
    
    if (s.licensed) {
      $("statusText").textContent = s.message;
      $("licensedSection").style.display = "block";
      $("trialSection").style.display = "none";
      $("activateSection").style.display = "none";
      $("btnEnter").style.display = "block";
      $("licensedInfo").textContent = s.days_left === -1 ? "永久授权" : 
        ("剩余 " + s.days_left + " 天");
    } else if (s.trial) {
      $("statusText").textContent = s.message;
      $("trialSection").style.display = "block";
      $("trialDays").textContent = s.days_left;
      $("btnEnter").style.display = "block";
    } else {
      $("statusText").textContent = "试用期已结束，请输入激活码继续使用";
      $("activateSection").style.display = "block";
    }
  } catch(e) {
    $("statusText").textContent = "无法连接到服务";
  }
}

async function doActivate() {
  const code = $("codeInput").value.trim();
  if (!code) {
    setMsg("请输入激活码", false);
    return;
  }
  
  const btn = $("btnActivate");
  btn.disabled = true;
  btn.textContent = "正在验证…";
  setMsg("", true);
  
  try {
    const r = await fetch(API + "/license/activate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code: code}),
    });
    const d = await r.json();
    if (r.ok) {
      setMsg(d.message || "激活成功！", true);
      setTimeout(() => location.reload(), 1500);
    } else {
      setMsg(d.detail || "激活失败", false);
    }
  } catch(e) {
    setMsg("网络错误：" + e.message, false);
  } finally {
    btn.disabled = false;
    btn.textContent = "激活";
  }
}

function enterApp() {
  window.location.href = "/";
}

// Enter key to activate
$("codeInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doActivate();
});

checkStatus();
</script>
</body>
</html>
